name: polkadart
description: Polkadart is a set of packages that provides a high-level interface for interacting with Polkadot, you can query storage, submit extrinsics, make RPC calls and much more. #polkadot #blockchain
version: 1.1.0
homepage: https://github.com/leonardocustodio/polkadart/tree/main/packages/polkadart
repository: https://github.com/leonardocustodio/polkadart
resolution: workspace

environment:
  sdk: ^3.8.0

dependencies:
  convert: ^3.1.1 # BSD-3-Clause
  http: ^1.4.0 # BSD-3-Clause
  web_socket_client: ^0.2.1 # MIT
  polkadart_scale_codec: ^2.0.0 # Apache 2.0
  substrate_metadata: ^2.0.0 # Apache 2.0
  ss58: ^2.0.0
  equatable: ^2.0.8
  json_serializable: ^6.11.4
  json_annotation: ^4.10.0

dev_dependencies:
  polkadart_keyring: ^0.7.2
  build_runner: ^2.12.1
  lints: 6.1.0
  test: 1.31.0
