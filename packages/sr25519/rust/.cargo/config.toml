# Cargo configuration for cross-compilation to mobile targets.

[target.aarch64-linux-android]
linker = "aarch64-linux-android-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi-clang"

[target.i686-linux-android]
linker = "i686-linux-android-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android-clang"

[target.aarch64-apple-ios]
linker = "clang"

[target.x86_64-apple-ios]
linker = "clang"

# Keep cross-built mobile/desktop artifacts on the same optimised release profile as Cargo.toml.
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
