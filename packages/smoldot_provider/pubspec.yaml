name: smoldot_provider
description: >-
  A light-client (smoldot) JSON-RPC provider for Dart, mirroring polkadot-api's
  smoldot provider (`@polkadot-api/sm-provider`). Turns a smoldot `Chain` into a
  standard string-based `JsonRpcProvider` you can drive with your own JSON-RPC
  client.
version: 0.1.0
repository: https://github.com/snowpinelabs/polkadart
resolution: workspace

environment:
  sdk: ^3.8.0

dependencies:
  smoldot: ^1.2.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
